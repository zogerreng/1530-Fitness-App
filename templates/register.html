<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoreConnect Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
</head>
<body>
    <div class="header">
      <h1>CoreConnect</h1>
      <p>Start your fitness journey</p>
    </div>

    <div class="main-container">
      <div class="image-side">
        <img src="https://e7.pngegg.com/pngimages/888/817/png-clipart-exercise-emoji-physical-fitness-weight-training-olympic-weightlifting-weightlifting-hand-sport.png" alt="Fitness">
      </div>
      <div class="form-side">
        <h2>Create an account</h2>
        <form action="{{ register_reference }}" method="POST" id="registerForm">
          <input type="email" id="email" name="email" placeholder="Email address" required />
          <input type="password" id="password" name="password" placeholder="Password" required />
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Confirm password"
            required
          />
          <button type="submit">Register</button>
        </form>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-container">
              {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
        <p class="form-hint">{{ password_requirements }}</p>
        <p class="alt-action">
          Already have an account?
          <a href="{{ login_reference }}">Sign in</a>
        </p>
      </div>
    </div>
  </body>
</html>
