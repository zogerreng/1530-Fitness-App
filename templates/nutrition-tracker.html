<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreConnect Nutrition Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0f3d5f',
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <div class="min-h-screen bg-slate-900/40">
    <div class="mx-auto max-w-4xl space-y-6 px-4 py-8 sm:px-6 lg:px-8">
      <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.6em] text-slate-400">Nutrition</p>
          <h1 class="text-3xl font-semibold text-white">Nutrition Tracker</h1>
          <p class="text-sm text-slate-300">Record meals, monitor macros, and stay on target.</p>
        </div>
        <a href="{{ url_for('dashboard') }}" class="rounded-full border border-white/30 px-4 py-2 text-sm font-semibold uppercase tracking-wide text-white transition hover:bg-white/10">Back to Dashboard</a>
      </div>
      <div class="grid gap-6 md:grid-cols-2">
        <div class="space-y-6 rounded-3xl border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/40">
          <h2 class="text-xl font-semibold text-white">Meal Log</h2>
          <p class="text-sm text-slate-200">Add breakfast, lunch, dinner, and snacks to keep your energy transparent.</p>
          <button class="w-full rounded-2xl bg-gradient-to-r from-primary to-[#07619e] px-4 py-3 text-sm font-semibold uppercase tracking-wide text-white transition hover:opacity-95">
            Start logging a meal
          </button>
        </div>
        <div class="space-y-4 rounded-3xl border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/40">
          <p class="text-sm text-slate-200">Macro targets</p>
          <div class="space-y-2">
            <div class="flex justify-between text-white">
              <span>Protein</span><span>140g</span>
            </div>
            <div class="flex justify-between text-white">
              <span>Carbs</span><span>220g</span>
            </div>
            <div class="flex justify-between text-white">
              <span>Fats</span><span>65g</span>
            </div>
          </div>
        </div>
      </div>
      <div class="rounded-3xl border border-white/10 bg-gradient-to-r from-white/10 to-transparent p-6 shadow-2xl shadow-black/40">
        <p class="text-sm text-slate-200">This section is ready for future meal entries and charts.</p>
      </div>
    </div>
  </div>
</body>
</html>
